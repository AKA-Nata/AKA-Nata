<svg width="1100" height="820" viewBox="0 0 1100 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1100" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d1117"/>
      <stop offset="0.48" stop-color="#0b1324"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="stroke" x1="20" y1="20" x2="1080" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#238636"/>
      <stop offset="0.45" stop-color="#1f6feb"/>
      <stop offset="1" stop-color="#bc8cff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.40"/>
    </filter>
  </defs>

  <rect width="1100" height="820" fill="none"/>
  <rect x="18" y="18" width="1064" height="784" rx="22" fill="url(#bg)" stroke="url(#stroke)" filter="url(#shadow)"/>
  <rect x="18" y="18" width="1064" height="54" rx="22" fill="#161b22" opacity="0.98"/>
  <circle cx="48" cy="45" r="7" fill="#ff5f56"/>
  <circle cx="72" cy="45" r="7" fill="#ffbd2e"/>
  <circle cx="96" cy="45" r="7" fill="#27c93f"/>
  <text x="550" y="50" text-anchor="middle" fill="#8b949e" font-size="14" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace">nata@github: ~/systems-integration</text>
  <rect x="990" y="32" width="66" height="26" rx="13" fill="#0d1117" stroke="#238636" opacity="0.95"/>
  <circle cx="1007" cy="45" r="4" fill="#3fb950">
    <animate attributeName="opacity" values="0.35;1;0.35" dur="1.6s" repeatCount="indefinite" />
  </circle>
  <text x="1020" y="49" fill="#7ee787" font-size="11" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace">online</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="15">
    <text x="48" y="104" fill="#7ee787" opacity="0">$ whoami<animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="0.0s" fill="freeze" /></text>
    <text x="48" y="128" fill="#f0f6fc" opacity="0">Natã Rafael Barbosa · Integration Analyst<animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="0.35s" fill="freeze" /></text>
    <text x="48" y="152" fill="#c9d1d9" opacity="0">Systems Integration · Automation · Oracle · APIs · Data Engineering · Healthcare IT<animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="0.70s" fill="freeze" /></text>

    <text x="48" y="200" fill="#7ee787" opacity="0">$ cat operating-profile.md<animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="1.10s" fill="freeze" /></text>
    <text x="48" y="224" fill="#c9d1d9" opacity="0">I connect systems, automate manual routines and transform operational data into reliable workflows.<animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="1.45s" fill="freeze" /></text>
    <text x="48" y="248" fill="#c9d1d9" opacity="0">Focus: traceability, data quality, secure deployment and production stability.<animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="1.80s" fill="freeze" /></text>

    <text x="48" y="296" fill="#7ee787" opacity="0">$ ls stack/<animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="2.20s" fill="freeze" /></text>
    <text x="48" y="320" fill="#ffa657" opacity="0">python  oracle/plsql  ords  fastapi  react/vite  docker  powerbi<animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="2.55s" fill="freeze" /></text>
    <text x="48" y="344" fill="#ffa657" opacity="0">automationedge  selenium  sftp/smb  kotlin/compose  git  github<animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="2.90s" fill="freeze" /></text>

    <text x="48" y="392" fill="#7ee787" opacity="0">$ run current-tracks --public-summary<animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="3.30s" fill="freeze" /></text>
    <text x="48" y="416" fill="#79c0ff" opacity="0">✓ Checklist SOS Platform            -> FastAPI, React, Oracle, Docker, audit, security<animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="3.65s" fill="freeze" /></text>
    <text x="48" y="440" fill="#79c0ff" opacity="0">✓ Provider Portal / Technical Visits -> workflows, documents, action plans, evidence<animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="4.00s" fill="freeze" /></text>
    <text x="48" y="464" fill="#79c0ff" opacity="0">✓ Oracle Object Export + Git         -> metadata extraction, diffs, documentation, governance<animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="4.35s" fill="freeze" /></text>
    <text x="48" y="488" fill="#79c0ff" opacity="0">✓ Clinical Data Integrations         -> views, mappings, validation, healthcare indicators<animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="4.70s" fill="freeze" /></text>
    <text x="48" y="512" fill="#79c0ff" opacity="0">✓ Local AI for dashboards            -> reduced payloads, strict JSON, backend validation<animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="5.05s" fill="freeze" /></text>
    <text x="48" y="536" fill="#79c0ff" opacity="0">✓ PDF and document automation        -> extraction, reconciliation, logs and reports<animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="5.40s" fill="freeze" /></text>

    <text x="48" y="584" fill="#7ee787" opacity="0">$ git log --public-repos --oneline<animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="5.80s" fill="freeze" /></text>
    <text x="48" y="608" fill="#c9d1d9" opacity="0">API_NV · ELT_DadosHistoricos · ETL_ScoreTelefone · SFTP · GestorPropostasEAcordos<animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="6.15s" fill="freeze" /></text>

    <text x="48" y="656" fill="#7ee787" opacity="0">$ grep impact delivery.log<animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="6.55s" fill="freeze" /></text>
    <text x="48" y="680" fill="#a5d6ff" opacity="0">automation · traceability · data reliability · secure deploy · technical governance<animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="6.90s" fill="freeze" /></text>

    <text x="48" y="728" fill="#7ee787" opacity="0">$ echo "ready for the next integration"<animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="7.30s" fill="freeze" /></text>
    <text x="48" y="752" fill="#f0f6fc" opacity="0">ready for the next integration<animate attributeName="opacity" from="0" to="1" dur="0.01s" begin="7.65s" fill="freeze" /></text>
    <rect x="376" y="737" width="9" height="19" rx="2" fill="#7ee787" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="0.9s" begin="8.0s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>

<svg width="1100" height="260" viewBox="0 0 1100 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="line" x1="70" y1="130" x2="1030" y2="130" gradientUnits="userSpaceOnUse">
      <stop stop-color="#238636"/><stop offset="0.5" stop-color="#1f6feb"/><stop offset="1" stop-color="#bc8cff"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="1100" height="260" rx="18" fill="#0d1117"/>
  <text x="550" y="42" text-anchor="middle" fill="#f0f6fc" font-size="23" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">Integration delivery flow</text>
  <text x="550" y="68" text-anchor="middle" fill="#8b949e" font-size="13" font-family="Inter, Segoe UI, Arial, sans-serif">from operational problem to monitored production workflow</text>
  <rect x="80" y="128" width="940" height="4" rx="2" fill="url(#line)" opacity="0.85"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" filter="url(#soft)">
    <g>
      <rect x="55" y="100" width="150" height="72" rx="14" fill="#161b22" stroke="#238636"/>
      <text x="130" y="130" text-anchor="middle" fill="#7ee787" font-size="15" font-weight="700">Map</text>
      <text x="130" y="151" text-anchor="middle" fill="#8b949e" font-size="12">process &amp; data</text>
    </g>
    <g>
      <rect x="250" y="100" width="150" height="72" rx="14" fill="#161b22" stroke="#2f81f7"/>
      <text x="325" y="130" text-anchor="middle" fill="#79c0ff" font-size="15" font-weight="700">Integrate</text>
      <text x="325" y="151" text-anchor="middle" fill="#8b949e" font-size="12">APIs &amp; ORDS</text>
    </g>
    <g>
      <rect x="445" y="100" width="150" height="72" rx="14" fill="#161b22" stroke="#ffa657"/>
      <text x="520" y="130" text-anchor="middle" fill="#ffa657" font-size="15" font-weight="700">Automate</text>
      <text x="520" y="151" text-anchor="middle" fill="#8b949e" font-size="12">workers &amp; RPA</text>
    </g>
    <g>
      <rect x="640" y="100" width="150" height="72" rx="14" fill="#161b22" stroke="#d2a8ff"/>
      <text x="715" y="130" text-anchor="middle" fill="#d2a8ff" font-size="15" font-weight="700">Validate</text>
      <text x="715" y="151" text-anchor="middle" fill="#8b949e" font-size="12">data quality</text>
    </g>
    <g>
      <rect x="835" y="100" width="150" height="72" rx="14" fill="#161b22" stroke="#bc8cff"/>
      <text x="910" y="130" text-anchor="middle" fill="#bc8cff" font-size="15" font-weight="700">Operate</text>
      <text x="910" y="151" text-anchor="middle" fill="#8b949e" font-size="12">logs &amp; support</text>
    </g>
  </g>
  <circle cx="78" cy="130" r="6" fill="#7ee787">
    <animate attributeName="cx" values="78;1020;78" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;1;0.4" dur="7s" repeatCount="indefinite"/>
  </circle>
</svg>
